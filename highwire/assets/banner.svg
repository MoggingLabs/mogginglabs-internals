<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Highwire">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#131a33"/>
      <stop offset="100%" stop-color="#1c2547"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" rx="20" fill="url(#bg)"/>

  <!-- the wire -->
  <line x1="60" y1="150" x2="1140" y2="150" stroke="url(#wire)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="60" cy="150" r="7" fill="#38bdf8"/>
  <circle cx="1140" cy="150" r="7" fill="#f472b6"/>

  <!-- wordmark -->
  <text x="600" y="132" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="86" font-weight="800" letter-spacing="6" fill="#f8fafc">HIGHWIRE</text>
  <text x="600" y="196" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" font-weight="500" letter-spacing="2" fill="#94a3b8">Drive GoHighLevel from Claude &#8212; the whole platform, carefully.</text>
  <text x="600" y="245" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" letter-spacing="5" fill="#64748b">MOGGINGLABS&#160;&#160;INTERNALS</text>
</svg>
